<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #eee;
    }
    h1 { margin-bottom: 10px; font-size: 2rem; color: #4ecca3; }
    #score { margin-bottom: 12px; font-size: 1.2rem; }
    canvas {
      border: 2px solid #4ecca3;
      background: #16213e;
    }
    #message {
      margin-top: 14px;
      font-size: 1rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="message">Press any arrow key to start</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, next, food, score, running, loop;

    function init() {
      snake = [{ x: 10, y: 10 }];
      dir = { x: 0, y: 0 };
      next = { x: 0, y: 0 };
      score = 0;
      running = false;
      updateScore();
      placeFood();
      draw();
      document.getElementById('message').textContent = 'Press any arrow key to start';
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function updateScore() {
      document.getElementById('score').textContent = 'Score: ' + score;
    }

    function step() {
      dir = { ...next };
      if (dir.x === 0 && dir.y === 0) return;

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Food
      ctx.fillStyle = '#e94560';
      ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);

      // Snake
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#4ecca3' : '#3aaf8f';
        ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
      });
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      document.getElementById('message').textContent = `Game over! Score: ${score} — Press arrow key to restart`;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
    }

    document.addEventListener('keydown', e => {
      const moves = {
        ArrowUp:    { x: 0,  y: -1 },
        ArrowDown:  { x: 0,  y:  1 },
        ArrowLeft:  { x: -1, y:  0 },
        ArrowRight: { x: 1,  y:  0 },
      };
      const m = moves[e.key];
      if (!m) return;
      e.preventDefault();

      // Prevent reversing
      if (m.x === -dir.x && m.y === -dir.y) return;
      next = m;

      if (!running) {
        running = true;
        document.getElementById('message').textContent = 'Arrow keys to move';
        if (score === 0 && dir.x === 0 && dir.y === 0) {
          // fresh start
        } else {
          init();
          next = m;
          running = true;
          document.getElementById('message').textContent = 'Arrow keys to move';
        }
        loop = setInterval(step, 120);
      }
    });

    init();
  </script>
</body>
</html>
